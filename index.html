<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Clés du Jeu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1714;
    --paper: #f5f0e8;
    --cream: #ede8db;
    --gold: #c9a84c;
    --gold-light: #e8d5a0;
    --red: #a63d2f;
    --blue: #2c4a6e;
    --green: #3a6b4a;
    --purple: #5c3d7a;
    --orange: #c46b1a;
  }

  body {
    background: var(--ink);
    font-family: 'DM Mono', monospace;
    color: var(--paper);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRAIN */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  .app { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 5vw, 48px);
    letter-spacing: -0.02em;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 8px;
  }

  header p {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 32px;
  }

  /* TIMER CONFIG */
  .timer-config {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .timer-config label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #666;
  }

  .timer-config input {
    background: transparent;
    border: 1px solid #333;
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 6px 10px;
    width: 70px;
    text-align: center;
    border-radius: 2px;
    outline: none;
  }

  .timer-config input:focus { border-color: var(--gold); }

  /* BTN DEAL */
  .btn-deal {
    display: block;
    margin: 0 auto;
    background: var(--gold);
    color: var(--ink);
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 40px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .btn-deal:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn-deal:active { transform: translateY(0); }

  /* CARDS GRID */
  .cards-grid { display: none; }
  .cards-grid.visible { display: block; animation: fadeUp 0.5s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ROW */
  .row {
    display: grid;
    gap: 16px;
    margin-bottom: 20px;
  }

  .row-2 { grid-template-columns: 1fr 1fr; }
  .row-1 { grid-template-columns: 1fr; }
  .row-3 { grid-template-columns: 1fr 1fr 1fr; }

  @media (max-width: 600px) {
    .row-2, .row-3 { grid-template-columns: 1fr; }
  }

  /* CARD */
  .card {
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    transition: transform 0.2s;
  }

  .card:hover { transform: translateY(-2px); }

  .card-band {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-band .type {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 500;
    opacity: 0.9;
  }

  .card-band .num {
    font-size: 10px;
    opacity: 0.6;
  }

  .card-body {
    padding: 18px 16px 20px;
    background: #111;
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    line-height: 1.3;
    margin-bottom: 8px;
    color: var(--paper);
  }

  .card-sub {
    font-size: 11px;
    color: #888;
    font-style: italic;
    line-height: 1.5;
  }

  /* COLOR VARIANTS */
  .card-perso .card-band { background: var(--purple); color: #e8dcf0; }
  .card-situ .card-band { background: var(--green); color: #d8eedd; }
  .card-obj .card-band { background: var(--orange); color: #fbe5c8; }
  .card-event .card-band { background: #222; color: #888; }
  .card-event.revealed .card-band { background: var(--red); color: #f5d0cc; }

  /* SECRET CARD */
  .card-secret .card-body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 90px;
    cursor: pointer;
    user-select: none;
    background: #0d0d0d;
    transition: background 0.2s;
  }

  .card-secret .card-body:hover { background: #151515; }

  .card-secret .card-body .hint {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #444;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .card-secret.open .card-body {
    display: block;
    cursor: default;
    background: #111;
  }

  /* EVENT LOCKED */
  .card-event .card-body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80px;
    background: #0a0a0a;
  }

  .card-event .lock-content {
    text-align: center;
  }

  .card-event .lock-content .countdown {
    font-size: 28px;
    font-weight: 300;
    color: #555;
    font-family: 'DM Serif Display', serif;
    display: block;
    margin-bottom: 4px;
  }

  .card-event .lock-content .lock-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #333;
  }

  .card-event.revealed .card-body {
    display: block;
    background: #120a0a;
  }

  .card-event.revealed .card-body .card-title {
    color: #f5d0cc;
  }

  /* TIMER BAR */
  .timer-section {
    margin: 24px 0 16px;
    position: relative;
  }

  .timer-bar-wrap {
    height: 3px;
    background: #1e1e1e;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .timer-bar {
    height: 100%;
    background: var(--gold);
    width: 100%;
    transform-origin: left;
    transition: width 1s linear;
  }

  .timer-bar.danger { background: var(--red); }

  .timer-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .timer-display {
    font-size: 13px;
    color: #777;
  }

  .timer-display span {
    color: var(--gold);
    font-size: 18px;
    font-family: 'DM Serif Display', serif;
  }

  .timer-display.danger span { color: var(--red); }

  .btn-start {
    background: transparent;
    border: 1px solid #333;
    color: #888;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .btn-start:hover { border-color: var(--gold); color: var(--gold); }

  .btn-start.running {
    border-color: var(--red);
    color: var(--red);
  }

  /* SECTION LABEL */
  .section-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* REVEALED FLASH */
  @keyframes revealFlash {
    0% { opacity: 0; transform: scale(0.97); }
    60% { opacity: 1; transform: scale(1.01); }
    100% { opacity: 1; transform: scale(1); }
  }

  .card-event.revealed { animation: revealFlash 0.4s ease both; }

  /* REDEAL */
  .bottom-bar {
    margin-top: 32px;
    text-align: center;
    border-top: 1px solid #1e1e1e;
    padding-top: 24px;
  }

  .btn-redeal {
    background: transparent;
    border: 1px solid #2a2a2a;
    color: #444;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 10px 24px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .btn-redeal:hover { border-color: #444; color: #888; }

  .btn-reroll {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.25);
    cursor: pointer;
    font-size: 13px;
    padding: 2px 4px;
    border-radius: 2px;
    transition: color 0.15s;
    font-family: inherit;
    line-height: 1;
  }
  .btn-reroll:hover { color: rgba(255,255,255,0.7); }
  .band-right { display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Les Clés du Jeu</h1>
    <p>Jeu d'impro · direction d'acteur</p>
    <div class="timer-config">
      <label>Événement dans</label>
      <input type="number" id="timerInput" value="120" min="10" max="600">
      <label>secondes</label>
    </div>
    <button class="btn-deal" onclick="deal()">Distribuer les cartes</button>
  </header>

  <div class="cards-grid" id="grid">

    <div class="section-label">Personnages</div>
    <div class="row row-2" id="persoRow"></div>

    <div class="section-label">Objectifs secrets — cliquez pour révéler</div>
    <div class="row row-2" id="objRow"></div>

    <div class="section-label">Situation</div>
    <div class="row row-1" id="situRow"></div>

    <div class="timer-section">
      <div class="timer-bar-wrap">
        <div class="timer-bar" id="timerBar"></div>
      </div>
      <div class="timer-info">
        <div class="timer-display" id="timerDisplay"><span id="timerCount">--</span> · événement verrouillé</div>
        <button class="btn-start" id="btnStart" onclick="toggleTimer()">▶ Démarrer</button>
      </div>
    </div>

    <div class="section-label">Événement</div>
    <div class="row row-1" id="eventRow"></div>

    <div class="bottom-bar">
      <button class="btn-redeal" onclick="deal()">↺ Nouvelle pioche</button>
    </div>

  </div>
</div>

<script>
const DATA = {
  personnages: [
    ["Un médecin en fin de garde de 24h", "Épuisé mais encore là"],
    ["Une personne qui vient de perdre son emploi", "Ce matin"],
    ["Un ancien militaire qui revient dans sa ville", "Après 8 ans d'absence"],
    ["Une influenceuse en crise d'identité", "Elle ne sait plus qui elle est"],
    ["Un professeur qui part à la retraite demain", "Son dernier jour"],
    ["Quelqu'un qui ment en permanence", "Sans s'en rendre compte"],
    ["Un jeune arrivé dans une nouvelle ville", "Il ne connaît personne"],
    ["Une mère de famille qui cache quelque chose", "Depuis des années"],
    ["Un artiste raté qui n'a jamais abandonné", "Il a 45 ans"],
    ["Un vendeur désespéré à la fin du mois", "Il doit conclure"],
    ["Une serveuse qui observe les gens depuis 20 ans", "Elle a tout vu"],
    ["Un joueur professionnel qui a tout perdu", "Il y a 3 jours"],
    ["Un enfant de 10 ans dans un corps d'adulte", "Il découvre tout"],
    ["Quelqu'un qui vient d'apprendre une bonne nouvelle", "Il n'a encore rien dit"],
    ["Un ex-détective reconverti", "Il observe encore"],
    ["Un moine en vacances pour la première fois", "Complètement perdu"],
    ["Une personne en deuil récent", "Elle fait semblant d'aller bien"],
    ["Un homme politique qui vient de démissionner", "Soulagé ou brisé ?"],
    ["Quelqu'un qui attend des résultats médicaux", "Depuis ce matin"],
    ["Un cambrioleur à la retraite", "Il s'ennuie"],
  ],
  situations: [
    ["Salle d'attente aux urgences", "Résultats inconnus, longue attente"],
    ["Le dernier service d'un restaurant qui ferme", "Ce soir c'est fini"],
    ["Un ascenseur bloqué entre deux étages", "Ils ne se connaissent pas"],
    ["Une cuisine à 6h du matin", "Avant que les autres se réveillent"],
    ["Un banc de parc en fin de journée", "Il fait froid"],
    ["Le couloir d'un tribunal", "Avant l'audience"],
    ["Une voiture en panne sur l'autoroute, la nuit", "Pas de réseau"],
    ["Le hall d'un immeuble à minuit", "L'entrée est bloquée"],
    ["Une caisse de supermarché qui ferme", "Derniers clients"],
    ["Un quai de gare — le dernier train est parti", "Il y a 5 min"],
    ["Une terrasse de café pendant un orage", "Ils ne peuvent pas partir"],
    ["La réserve d'un magasin en inventaire", "Fin de nuit"],
    ["Une salle de sport déserte", "Après la fermeture"],
    ["Le bord d'une piscine, hors saison", "Abandonnée"],
    ["Un couloir d'immeuble devant une porte", "L'un des deux a sonné"],
  ],
  objectifs: [
    ["Obtenir quelque chose sans le demander", "Jamais directement"],
    ["Faire partir l'autre sans lui dire pourquoi", "Il ne doit pas comprendre"],
    ["Avouer quelque chose sans jamais le dire", "À mots couverts"],
    ["Convaincre l'autre de rester", "Coûte que coûte"],
    ["Tester si l'autre peut être de confiance", "Sans qu'il le sache"],
    ["Cacher que tu as peur", "Faire semblant d'être fort"],
    ["Prendre une décision que tu repousses", "C'est maintenant ou jamais"],
    ["Faire comme si tout allait bien", "Alors que rien ne va"],
    ["Récupérer quelque chose qui t'appartient", "Sans accusation"],
    ["T'excuser sans jamais dire pardon", "Trouver un autre chemin"],
    ["Savoir si l'autre est au courant", "Sans le lui demander"],
    ["Repartir avec quelque chose que tu n'avais pas", "Un objet, une info, une promesse"],
    ["Gagner du temps", "La raison n'a pas d'importance"],
    ["Décider si tu peux faire confiance à cette personne", "En une seule scène"],
    ["Lui annoncer quelque chose sans le dire", "Il doit comprendre seul"],
    ["Te faire oublier le plus vite possible", "Disparaître en douceur"],
    ["Convaincre l'autre que tu vas bien", "Même si tu mens"],
    ["Empêcher l'autre de partir", "Sans que ça soit visible"],
    ["Trouver une information précise", "Discrètement"],
    ["Changer d'avis sur cette personne", "En mieux ou en pire"],
  ],
  evenements: [
    ["Un téléphone sonne — l'un des deux doit sortir", "Il revient dans 30 secondes"],
    ["La lumière s'éteint", "Ou baisse brutalement"],
    ["On frappe fort à la porte", "Personne n'attend quelqu'un"],
    ["Un objet tombe et se casse", "Quelque chose d'important"],
    ["L'un reçoit un message qui change tout", "Il le lit devant l'autre"],
    ["Il commence à pleuvoir très fort", "Ils sont coincés"],
    ["On entend des cris au loin", "Puis silence"],
    ["L'un doit partir dans exactement 2 minutes", "Il vient de se souvenir"],
    ["Un inconnu entre dans l'espace", "Et repart sans un mot"],
    ["Une annonce passe à la radio", "Ils l'entendent tous les deux"],
    ["L'un trouve quelque chose par terre", "Un objet qui ne devrait pas être là"],
    ["Le ton monte malgré eux", "Ils ne le choisissent pas"],
    ["Il fait soudainement très froid", "Coupure de chauffage"],
    ["Ce qu'ils attendaient arrive enfin", "Une personne, un bruit, un signe"],
    ["Quelqu'un qu'ils connaissent tous les deux passe", "Ils le voient, il ne les voit pas"],
  ],
};

function pick(arr, exclude=[]) {
  const available = arr.filter((_, i) => !exclude.includes(i));
  const idx = Math.floor(Math.random() * available.length);
  return [available[idx], arr.indexOf(available[idx])];
}

const state = { p1i:-1, p2i:-1, o1i:-1, o2i:-1, situi:-1, evi:-1 };

function makeCard(type, data, idx, secret=false, slot='') {
  const typeLabels = { perso:'Personnage', situ:'Situation', obj:'Objectif secret', event:'Événement' };
  const reroll = `<button class="btn-reroll" onclick="reroll('${slot}',event)" title="Nouvelle carte">↺</button>`;

  if (secret) {
    return `
      <div class="card card-${type} card-secret" id="card-${slot}" data-slot="${slot}" data-idx="${idx}">
        <div class="card-band">
          <span class="type">${typeLabels[type]}</span>
          <div class="band-right">${reroll}</div>
        </div>
        <div class="card-body" onclick="revealSecret('card-${slot}', this)">
          <div class="hint">Appuyer pour révéler<br>à l'acteur concerné</div>
          <div class="card-title" style="display:none">${data[0]}</div>
          <div class="card-sub" style="display:none">${data[1]}</div>
        </div>
      </div>`;
  }

  return `
    <div class="card card-${type}" id="card-${slot}" data-slot="${slot}" data-idx="${idx}">
      <div class="card-band">
        <span class="type">${typeLabels[type]}</span>
        <div class="band-right">${reroll}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${data[0]}</div>
        <div class="card-sub">${data[1]}</div>
      </div>
    </div>`;
}

function makeEventCard(data, idx) {
  const reroll = `<button class="btn-reroll" onclick="reroll('ev',event)" title="Nouvelle carte">↺</button>`;
  return `
    <div class="card card-event" id="eventCard" data-slot="ev" data-idx="${idx}">
      <div class="card-band">
        <span class="type">Événement</span>
        <div class="band-right">${reroll}</div>
      </div>
      <div class="card-body">
        <div class="lock-content">
          <span class="countdown" id="eventCountdown">--</span>
          <span class="lock-label">Se révèle au démarrage du timer</span>
          <button class="btn-reveal-early" onclick="revealEvent()" style="margin-top:10px;background:transparent;border:1px solid #2a2a2a;color:#333;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:6px 14px;cursor:pointer;border-radius:2px;transition:all .2s" onmouseover="this.style.borderColor='#555';this.style.color='#777'" onmouseout="this.style.borderColor='#2a2a2a';this.style.color='#333'">Révéler maintenant</button>
        </div>
        <div class="card-title" style="display:none" id="eventTitle">${data[0]}</div>
        <div class="card-sub" style="display:none" id="eventSub">${data[1]}</div>
      </div>
    </div>`;
}

function reroll(slot, e) {
  e.stopPropagation();
  const sourceMap = { p1:'personnages', p2:'personnages', o1:'objectifs', o2:'objectifs', situ:'situations', ev:'evenements' };
  const src = DATA[sourceMap[slot]];

  // exclude sibling card of same type
  const excludes = [];
  if (slot === 'p1') excludes.push(state.p2i);
  if (slot === 'p2') excludes.push(state.p1i);
  if (slot === 'o1') excludes.push(state.o2i);
  if (slot === 'o2') excludes.push(state.o1i);

  const [newData, newIdx] = pick(src, excludes);
  state[slot+'i'] = newIdx;

  const secret = slot === 'o1' || slot === 'o2';
  const typeMap = { p1:'perso', p2:'perso', o1:'obj', o2:'obj', situ:'situ', ev:'ev' };

  if (slot === 'ev') {
    document.getElementById('eventRow').innerHTML = makeEventCard(newData, newIdx);
    // restore timer display on event card
    const evCountdown = document.getElementById('eventCountdown');
    if (evCountdown && !eventRevealed) {
      evCountdown.textContent = formatTime(timerRemaining);
    }
    return;
  }

  const card = document.getElementById('card-'+slot);
  const row = card.parentElement;
  const newHtml = makeCard(typeMap[slot], newData, newIdx, secret, slot);
  card.outerHTML = newHtml;

  // flash
  const updated = document.getElementById('card-'+slot);
  updated.style.opacity = '0';
  updated.style.transform = 'scale(0.97)';
  requestAnimationFrame(() => {
    updated.style.transition = 'opacity 0.2s, transform 0.2s';
    updated.style.opacity = '1';
    updated.style.transform = 'scale(1)';
  });
}

function revealSecret(id, bodyEl) {
  const card = document.getElementById(id);
  const isOpen = card.classList.contains('open');
  if (isOpen) {
    card.classList.remove('open');
    bodyEl.querySelector('.hint').style.display = 'flex';
    bodyEl.querySelector('.card-title').style.display = 'none';
    bodyEl.querySelector('.card-sub').style.display = 'none';
  } else {
    card.classList.add('open');
    bodyEl.querySelector('.hint').style.display = 'none';
    bodyEl.querySelector('.card-title').style.display = 'block';
    bodyEl.querySelector('.card-sub').style.display = 'block';
  }
}

let timerInterval = null;
let timerTotal = 120;
let timerRemaining = 120;
let eventRevealed = false;
let eventData = null;

function deal() {
  clearInterval(timerInterval);
  timerInterval = null;
  eventRevealed = false;

  timerTotal = parseInt(document.getElementById('timerInput').value) || 120;
  timerRemaining = timerTotal;

  const [p1, p1i] = pick(DATA.personnages);
  const [p2, p2i] = pick(DATA.personnages, [p1i]);
  const [o1, o1i] = pick(DATA.objectifs);
  const [o2, o2i] = pick(DATA.objectifs, [o1i]);
  const [situ, situi] = pick(DATA.situations);
  const [ev, evi] = pick(DATA.evenements);

  state.p1i=p1i; state.p2i=p2i; state.o1i=o1i; state.o2i=o2i; state.situi=situi; state.evi=evi;
  eventData = ev;

  document.getElementById('persoRow').innerHTML =
    makeCard('perso', p1, p1i, true, 'p1') + makeCard('perso', p2, p2i, true, 'p2');

  document.getElementById('objRow').innerHTML =
    makeCard('obj', o1, o1i, true, 'o1') + makeCard('obj', o2, o2i, true, 'o2');

  document.getElementById('situRow').innerHTML =
    makeCard('situ', situ, situi, false, 'situ');

  document.getElementById('eventRow').innerHTML =
    makeEventCard(ev, evi);

  document.getElementById('timerBar').style.width = '100%';
  document.getElementById('timerBar').classList.remove('danger');
  document.getElementById('timerDisplay').classList.remove('danger');
  document.getElementById('timerDisplay').innerHTML = `<span id="timerCount">${formatTime(timerRemaining)}</span> · événement verrouillé`;
  document.getElementById('eventCountdown').textContent = formatTime(timerRemaining);

  const btn = document.getElementById('btnStart');
  btn.textContent = '▶ Démarrer';
  btn.classList.remove('running');

  const grid = document.getElementById('grid');
  grid.classList.remove('visible');
  void grid.offsetWidth;
  grid.classList.add('visible');
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  if (m > 0) return `${m}:${String(sec).padStart(2,'0')}`;
  return `${sec}s`;
}

function playRevealSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const times = [[0, 440, 0.15], [0.18, 554, 0.15], [0.36, 659, 0.3]];
    times.forEach(([when, freq, dur]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + when);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + when + 0.02);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + when + dur);
      osc.start(ctx.currentTime + when);
      osc.stop(ctx.currentTime + when + dur + 0.05);
    });
  } catch(e) {}
}

function revealEvent() {
  if (eventRevealed) return;
  eventRevealed = true;
  playRevealSound();
  const card = document.getElementById('eventCard');
  card.classList.add('revealed');
  card.querySelector('.lock-content').style.display = 'none';
  document.getElementById('eventTitle').style.display = 'block';
  document.getElementById('eventSub').style.display = 'block';
  document.getElementById('timerDisplay').innerHTML = `<span id="timerCount">Événement révélé !</span>`;
}

function toggleTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
    const btn = document.getElementById('btnStart');
    btn.textContent = '▶ Reprendre';
    btn.classList.remove('running');
    return;
  }

  const btn = document.getElementById('btnStart');
  btn.textContent = '⏸ Pause';
  btn.classList.add('running');

  timerInterval = setInterval(() => {
    timerRemaining--;
    const pct = (timerRemaining / timerTotal) * 100;
    const bar = document.getElementById('timerBar');
    bar.style.width = pct + '%';

    const display = document.getElementById('timerDisplay');
    const countEl = document.getElementById('timerCount');

    if (pct < 20) {
      bar.classList.add('danger');
      display.classList.add('danger');
    }

    if (timerRemaining > 0) {
      if (!eventRevealed) {
        if (countEl) countEl.textContent = formatTime(timerRemaining);
        const evCountdown = document.getElementById('eventCountdown');
        if (evCountdown) evCountdown.textContent = formatTime(timerRemaining);
        display.innerHTML = `<span id="timerCount">${formatTime(timerRemaining)}</span> · événement verrouillé`;
      }
    } else {
      clearInterval(timerInterval);
      timerInterval = null;
      btn.textContent = '▶ Démarrer';
      btn.classList.remove('running');
      revealEvent();
    }
  }, 1000);
}

</script>
