<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Et Action</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1714;
    --paper: #f5f0e8;
    --gold: #c9a84c;
    --gold-light: #e8d5a0;
    --red: #a63d2f;
    --green: #3a6b4a;
    --a1: #5c3d7a;
    --a1-text: #e8dcf0;
    --a2: #2c4a6e;
    --a2-text: #d0dcee;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    font-family: 'DM Mono', monospace;
    color: var(--paper);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  .app { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

  header { text-align: center; margin-bottom: 48px; }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 5vw, 48px);
    letter-spacing: -0.02em;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 8px;
  }

  header p {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 32px;
  }

  .timer-config {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .timer-config label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #666;
  }

  .timer-config input {
    background: transparent;
    border: 1px solid #333;
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 6px 10px;
    width: 70px;
    text-align: center;
    border-radius: 2px;
    outline: none;
  }

  .timer-config input:focus { border-color: var(--gold); }

  .btn-deal {
    display: block;
    margin: 0 auto;
    background: var(--gold);
    color: var(--ink);
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 40px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .btn-deal:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn-deal:active { transform: translateY(0); }

  .cards-grid { display: none; }
  .cards-grid.visible { display: block; animation: fadeUp 0.5s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .actors-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  @media (max-width: 600px) {
    .actors-row { grid-template-columns: 1fr; }
  }

  .actor-col { display: flex; flex-direction: column; gap: 10px; }
  .actor-col-a1 { border-left: 2px solid var(--a1); padding-left: 12px; }
  .actor-col-a2 { border-left: 2px solid var(--a2); padding-left: 12px; }

  .actor-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding-bottom: 4px;
  }

  .actor-label-a1 { color: var(--a1); }
  .actor-label-a2 { color: var(--a2); }

  .card {
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .card:hover { transform: translateY(-2px); }

  .card-band {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-band .type {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 500;
    opacity: 0.9;
  }

  .band-right { display: flex; align-items: center; gap: 6px; }

  .card-body { padding: 18px 16px 20px; background: #111; }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    line-height: 1.3;
    margin-bottom: 8px;
    color: var(--paper);
  }

  .card-sub { font-size: 11px; color: #888; font-style: italic; line-height: 1.5; }

  .card-a1 .card-band { background: var(--a1); color: var(--a1-text); }
  .card-a2 .card-band { background: var(--a2); color: var(--a2-text); }
  .card-rel .card-band { background: #7a5c2e; color: #f0e0c0; }
  .card-situ .card-band { background: var(--green); color: #d8eedd; }
  .card-event .card-band { background: #222; color: #888; }
  .card-event.revealed .card-band { background: var(--red); color: #f5d0cc; }

  .card-secret .card-body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80px;
    cursor: pointer;
    user-select: none;
    background: #0d0d0d;
    transition: background 0.2s;
  }

  .card-secret .card-body:hover { background: #151515; }

  .card-secret .card-body .hint {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #444;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .card-secret.open .card-body { display: block; cursor: default; background: #111; }

  .card-event .card-body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80px;
    background: #0a0a0a;
  }

  .card-event .lock-content { text-align: center; }

  .card-event .lock-content .countdown {
    font-size: 28px;
    font-weight: 300;
    color: #555;
    font-family: 'DM Serif Display', serif;
    display: block;
    margin-bottom: 4px;
  }

  .card-event .lock-content .lock-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #333;
  }

  .card-event.revealed .card-body { display: block; background: #120a0a; }
  .card-event.revealed .card-body .card-title { color: #f5d0cc; }

  .row { display: grid; gap: 16px; margin-bottom: 20px; }
  .row-1 { grid-template-columns: 1fr; }

  @keyframes revealFlash {
    0% { opacity: 0; transform: scale(0.97); }
    60% { opacity: 1; transform: scale(1.01); }
    100% { opacity: 1; transform: scale(1); }
  }

  .card-event.revealed { animation: revealFlash 0.4s ease both; }

  .timer-section { margin: 24px 0 16px; }

  .timer-bar-wrap {
    height: 3px;
    background: #1e1e1e;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .timer-bar {
    height: 100%;
    background: var(--gold);
    width: 100%;
    transform-origin: left;
    transition: width 1s linear;
  }

  .timer-bar.danger { background: var(--red); }

  .timer-info { display: flex; justify-content: space-between; align-items: center; }

  .timer-display { font-size: 13px; color: #777; }

  .timer-display span {
    color: var(--gold);
    font-size: 18px;
    font-family: 'DM Serif Display', serif;
  }

  .timer-display.danger span { color: var(--red); }

  .btn-start {
    background: transparent;
    border: 1px solid #333;
    color: #888;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .btn-start:hover { border-color: var(--gold); color: var(--gold); }
  .btn-start.running { border-color: var(--red); color: var(--red); }

  .bottom-bar {
    margin-top: 32px;
    text-align: center;
    border-top: 1px solid #1e1e1e;
    padding-top: 24px;
  }

  .btn-redeal {
    background: transparent;
    border: 1px solid #2a2a2a;
    color: #444;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 10px 24px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .btn-redeal:hover { border-color: #444; color: #888; }

  .btn-reroll {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.25);
    cursor: pointer;
    font-size: 13px;
    padding: 2px 4px;
    border-radius: 2px;
    transition: color 0.15s;
    font-family: inherit;
    line-height: 1;
  }

  .btn-reroll:hover { color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Et Action !</h1>
    <p>Jeu d'impro · direction d'acteur</p>
    <div class="timer-config">
      <label>Événement dans</label>
      <input type="number" id="timerInput" value="120" min="10" max="600">
      <label>secondes</label>
    </div>
    <button class="btn-deal" onclick="deal()">Distribuer les cartes</button>
  </header>

  <div class="cards-grid" id="grid">

    <div class="section-label">Acteurs — personnage · objectif · contrainte</div>
    <div class="actors-row">
      <div class="actor-col actor-col-a1" id="actor1Col"></div>
      <div class="actor-col actor-col-a2" id="actor2Col"></div>
    </div>

    <div class="section-label">Relation entre les acteurs</div>
    <div class="row row-1" id="relRow"></div>

    <div class="section-label">Situation</div>
    <div class="row row-1" id="situRow"></div>

    <div class="timer-section">
      <div class="timer-bar-wrap">
        <div class="timer-bar" id="timerBar"></div>
      </div>
      <div class="timer-info">
        <div class="timer-display" id="timerDisplay">
          <span id="timerCount">--</span> · événement verrouillé
        </div>
        <button class="btn-start" id="btnStart" onclick="toggleTimer()">▶ Démarrer</button>
      </div>
    </div>

    <div class="section-label">Événement</div>
    <div class="row row-1" id="eventRow"></div>

    <div class="bottom-bar">
      <button class="btn-redeal" onclick="deal()">↺ Nouvelle pioche</button>
    </div>

  </div>
</div>

<script>

    ["Vous partagez un secret que vous n'êtes pas censés connaître tous les deux", "Ni l'un ni l'autre ne sait que l'autre sait"],

    ["L'un de vous a rendu un service à l'autre, il y a longtemps", "Sans attendre de retour"],
    ["Vous avez failli vous rencontrer plusieurs fois avant aujourd'hui", "Quelque chose avait toujours empêché"],

  // Contraintes individuelles
  contraintes: [

  evenements: [
    ["Un téléphone sonne — l'un des deux doit sortir", "Il revient dans 30 secondes"],
    ["La lumière s'éteint", "Ou baisse brutalement"],
    ["On frappe fort à la porte", "Personne n'attend quelqu'un"],
    ["Un objet tombe et se casse", "Quelque chose d'important"],
    ["L'un reçoit un message qui change tout", "Il le lit devant l'autre"],
    ["Il commence à pleuvoir très fort", "Ils sont coincés"],
    ["On entend des cris au loin", "Puis silence"],
    ["L'un doit partir dans exactement 2 minutes", "Il vient de se souvenir"],

    ["Une annonce passe à la radio", "Ils l'entendent tous les deux"],

function pick(arr, exclude=[]) {
  const available = arr.filter((_, i) => !exclude.includes(i));
  const idx = Math.floor(Math.random() * available.length);
  return [available[idx], arr.indexOf(available[idx])];
}

const state = { p1i:-1, p2i:-1, o1i:-1, o2i:-1, ri:-1, c1i:-1, c2i:-1, situi:-1, evi:-1 };

function makeCard(type, title, sub, idx, secret, slot, actor) {
  const typeLabels = {
    perso:'Personnage', obj:'Objectif secret',
    relation:'Relation', contrainte:'Contrainte',
    situ:'Situation', event:'Événement'
  };
  const colorClass = actor ? `card-${actor}` : `card-${type}`;
  const reroll = `<button class="btn-reroll" onclick="reroll('${slot}',event)" title="Nouvelle carte">↺</button>`;
  const label = typeLabels[type] || type;

  if (secret) {
    return `
      <div class="card ${colorClass} card-secret" id="card-${slot}">
        <div class="card-band">
          <span class="type">${label}</span>
          <div class="band-right">${reroll}</div>
        </div>
        <div class="card-body" onclick="revealSecret('card-${slot}', this)">
          <div class="hint">Appuyer pour révéler<br>à l'acteur concerné</div>
          <div class="card-title" style="display:none">${title}</div>
          ${sub ? `<div class="card-sub" style="display:none">${sub}</div>` : ''}
        </div>
      </div>`;
  }

  return `
    <div class="card ${colorClass}" id="card-${slot}">
      <div class="card-band">
        <span class="type">${label}</span>
        <div class="band-right">${reroll}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${title}</div>
        ${sub ? `<div class="card-sub">${sub}</div>` : ''}
      </div>
    </div>`;
}

function makeEventCard(data, idx) {
  const reroll = `<button class="btn-reroll" onclick="reroll('ev',event)" title="Nouvelle carte">↺</button>`;
  return `
    <div class="card card-event" id="eventCard">
      <div class="card-band">
        <span class="type">Événement</span>
        <div class="band-right">${reroll}</div>
      </div>
      <div class="card-body">
        <div class="lock-content">
          <span class="countdown" id="eventCountdown">--</span>
          <span class="lock-label">Se révèle au démarrage du timer</span>
          <button onclick="revealEvent()" style="margin-top:10px;background:transparent;border:1px solid #2a2a2a;color:#333;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:6px 14px;cursor:pointer;border-radius:2px;transition:all .2s" onmouseover="this.style.borderColor='#555';this.style.color='#777'" onmouseout="this.style.borderColor='#2a2a2a';this.style.color='#333'">Révéler maintenant</button>
        </div>
        <div class="card-title" style="display:none" id="eventTitle">${data[0]}</div>
        <div class="card-sub" style="display:none" id="eventSub">${data[1]}</div>
      </div>
    </div>`;
}

function renderActorCol(actorNum) {
  const a = `a${actorNum}`;
  const si = actorNum === 1;
  const pi = si ? state.p1i : state.p2i;
  const oi = si ? state.o1i : state.o2i;
  const ci = si ? state.c1i : state.c2i;

  const p  = DATA.personnages[pi];
  const o  = DATA.objectifs[oi];
  const con = DATA.contraintes[ci];

  const slots = si
    ? { p:'p1', o:'o1', c:'c1' }
    : { p:'p2', o:'o2', c:'c2' };

  return `
    <div class="actor-label actor-label-${a}">Acteur ${actorNum}</div>
    ${makeCard('perso',     p[0],  p[1],   pi, true, slots.p, a)}
    ${makeCard('obj',       o[0],  o[1],   oi, true, slots.o, a)}
    ${makeCard('contrainte',con,   null,   ci, true, slots.c, a)}
  `;
}

function reroll(slot, e) {
  e.stopPropagation();

  if (slot === 'rel') {
    const [newRel, newIdx] = pick(DATA.relations, [state.ri]);
    state.ri = newIdx;
    replaceCard('card-rel', 'relation', newRel[0], newRel[1], newIdx, false, 'rel', null);
    return;
  }

  if (slot === 'ev') {
    const [newData, newIdx] = pick(DATA.evenements);
    state.evi = newIdx;
    document.getElementById('eventRow').innerHTML = makeEventCard(newData, newIdx);
    const evCountdown = document.getElementById('eventCountdown');
    if (evCountdown && !eventRevealed) evCountdown.textContent = formatTime(timerRemaining);
    return;
  }

  const cfg = {
    p1: { src:'personnages', excl:()=>[state.p2i], stateKey:'p1i', type:'perso',     actor:'a1', secret:true,  sub:true  },
    p2: { src:'personnages', excl:()=>[state.p1i], stateKey:'p2i', type:'perso',     actor:'a2', secret:true,  sub:true  },
    o1: { src:'objectifs',   excl:()=>[state.o2i], stateKey:'o1i', type:'obj',       actor:'a1', secret:true,  sub:true  },
    o2: { src:'objectifs',   excl:()=>[state.o1i], stateKey:'o2i', type:'obj',       actor:'a2', secret:true,  sub:true  },
    c1: { src:'contraintes', excl:()=>[state.c2i], stateKey:'c1i', type:'contrainte',actor:'a1', secret:true,  sub:false },
    c2: { src:'contraintes', excl:()=>[state.c1i], stateKey:'c2i', type:'contrainte',actor:'a2', secret:true,  sub:false },
    situ:{ src:'situations', excl:()=>[],          stateKey:'situi',type:'situ',     actor:null, secret:false, sub:true  },
  };

  const c = cfg[slot];
  if (!c) return;
  const [newData, newIdx] = pick(DATA[c.src], c.excl());
  state[c.stateKey] = newIdx;

  const title = Array.isArray(newData) ? newData[0] : newData;
  const sub   = c.sub && Array.isArray(newData) ? newData[1] : null;
  replaceCard('card-'+slot, c.type, title, sub, newIdx, c.secret, slot, c.actor);
}

function replaceCard(id, type, title, sub, idx, secret, slot, actor) {
  const el = document.getElementById(id);
  if (!el) return;
  el.outerHTML = makeCard(type, title, sub, idx, secret, slot, actor);
  const updated = document.getElementById(id);
  if (!updated) return;
  updated.style.opacity = '0';
  updated.style.transform = 'scale(0.97)';
  requestAnimationFrame(() => {
    updated.style.transition = 'opacity 0.2s, transform 0.2s';
    updated.style.opacity = '1';
    updated.style.transform = 'scale(1)';
  });
}

function revealSecret(id, bodyEl) {
  const card = document.getElementById(id);
  if (card.classList.contains('open')) {
    card.classList.remove('open');
    bodyEl.querySelector('.hint').style.display = 'flex';
    bodyEl.querySelector('.card-title').style.display = 'none';
    const sub = bodyEl.querySelector('.card-sub');
    if (sub) sub.style.display = 'none';
  } else {
    card.classList.add('open');
    bodyEl.querySelector('.hint').style.display = 'none';
    bodyEl.querySelector('.card-title').style.display = 'block';
    const sub = bodyEl.querySelector('.card-sub');
    if (sub) sub.style.display = 'block';
  }
}

let timerInterval = null;
let timerTotal = 120;
let timerRemaining = 120;
let eventRevealed = false;

function deal() {
  clearInterval(timerInterval);
  timerInterval = null;
  eventRevealed = false;

  timerTotal = parseInt(document.getElementById('timerInput').value) || 120;
  timerRemaining = timerTotal;

  const [p1, p1i]   = pick(DATA.personnages);
  const [p2, p2i]   = pick(DATA.personnages, [p1i]);
  const [o1, o1i]   = pick(DATA.objectifs);
  const [o2, o2i]   = pick(DATA.objectifs, [o1i]);
  const [rel, ri]    = pick(DATA.relations);
  const [,   c1i]   = pick(DATA.contraintes);
  const [,   c2i]   = pick(DATA.contraintes, [c1i]);
  const [situ, situi] = pick(DATA.situations);
  const [ev, evi]   = pick(DATA.evenements);

  Object.assign(state, { p1i, p2i, o1i, o2i, ri, c1i, c2i, situi, evi });

  document.getElementById('actor1Col').innerHTML = renderActorCol(1);
  document.getElementById('actor2Col').innerHTML = renderActorCol(2);
  document.getElementById('relRow').innerHTML    = makeCard('relation', rel[0], rel[1], ri, false, 'rel', null);
  document.getElementById('situRow').innerHTML   = makeCard('situ', situ[0], situ[1], situi, false, 'situ', null);
  document.getElementById('eventRow').innerHTML  = makeEventCard(ev, evi);

  document.getElementById('timerBar').style.width = '100%';
  document.getElementById('timerBar').classList.remove('danger');
  document.getElementById('timerDisplay').classList.remove('danger');
  document.getElementById('timerDisplay').innerHTML =
    `<span id="timerCount">${formatTime(timerRemaining)}</span> · événement verrouillé`;
  document.getElementById('eventCountdown').textContent = formatTime(timerRemaining);

  const btn = document.getElementById('btnStart');
  btn.textContent = '▶ Démarrer';
  btn.classList.remove('running');

  const grid = document.getElementById('grid');
  grid.classList.remove('visible');
  void grid.offsetWidth;
  grid.classList.add('visible');
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  if (m > 0) return `${m}:${String(sec).padStart(2,'0')}`;
  return `${sec}s`;
}

function playRevealSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[0,440,0.15],[0.18,554,0.15],[0.36,659,0.3]].forEach(([when, freq, dur]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + when);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + when + 0.02);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + when + dur);
      osc.start(ctx.currentTime + when);
      osc.stop(ctx.currentTime + when + dur + 0.05);
    });
  } catch(e) {}
}

function revealEvent() {
  if (eventRevealed) return;
  eventRevealed = true;
  playRevealSound();
  const card = document.getElementById('eventCard');
  card.classList.add('revealed');
  card.querySelector('.lock-content').style.display = 'none';
  document.getElementById('eventTitle').style.display = 'block';
  document.getElementById('eventSub').style.display = 'block';
  document.getElementById('timerDisplay').innerHTML =
    `<span id="timerCount">Événement révélé !</span>`;
}

function toggleTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
    const btn = document.getElementById('btnStart');
    btn.textContent = '▶ Reprendre';
    btn.classList.remove('running');
    return;
  }

  const btn = document.getElementById('btnStart');
  btn.textContent = '⏸ Pause';
  btn.classList.add('running');

  timerInterval = setInterval(() => {
    timerRemaining--;
    const pct = (timerRemaining / timerTotal) * 100;
    const bar = document.getElementById('timerBar');
    bar.style.width = pct + '%';
    const display = document.getElementById('timerDisplay');

    if (pct < 20) { bar.classList.add('danger'); display.classList.add('danger'); }

    if (timerRemaining > 0) {
      if (!eventRevealed) {
        display.innerHTML = `<span id="timerCount">${formatTime(timerRemaining)}</span> · événement verrouillé`;
        const evCountdown = document.getElementById('eventCountdown');
        if (evCountdown) evCountdown.textContent = formatTime(timerRemaining);
      }
    } else {
      clearInterval(timerInterval);
      timerInterval = null;
      btn.textContent = '▶ Démarrer';
      btn.classList.remove('running');
      revealEvent();
    }
  }, 1000);
}
